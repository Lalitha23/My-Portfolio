<svg width="680" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Orchestrator -->
  <rect x="190" y="20" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="41" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle">Orchestrator</text>
  <text x="340" y="59" font-size="12" fill="#534AB7" text-anchor="middle">routes user intent to right agent</text>

  <!-- Arrows orchestrator to agents -->
  <line x1="230" y1="76" x2="112" y2="152" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="295" y1="76" x2="252" y2="152" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="76" x2="340" y2="152" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="385" y1="76" x2="428" y2="152" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="76" x2="568" y2="152" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Current agents -->
  <rect x="40" y="152" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="105" y="173" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Agent 1</text>
  <text x="105" y="191" font-size="12" fill="#0F6E56" text-anchor="middle">resume workflow</text>

  <rect x="190" y="152" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="255" y="173" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Agent 2</text>
  <text x="255" y="191" font-size="12" fill="#0F6E56" text-anchor="middle">rejection watcher</text>

  <!-- Future agents -->
  <rect x="275" y="152" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="173" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Agent 3</text>
  <text x="340" y="191" font-size="12" fill="#854F0B" text-anchor="middle">follow-up agent</text>

  <rect x="360" y="152" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="425" y="173" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Agent 4</text>
  <text x="425" y="191" font-size="12" fill="#854F0B" text-anchor="middle">interview prep</text>

  <rect x="500" y="152" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="565" y="173" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Agent 5</text>
  <text x="565" y="191" font-size="12" fill="#854F0B" text-anchor="middle">status tracker</text>

  <!-- MCP server container -->
  <rect x="30" y="268" width="620" height="170" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="50" y="294" font-size="14" font-weight="500" fill="#0C447C">Single MCP server — all tools in one place</text>
  <text x="50" y="311" font-size="12" fill="#185FA5">Claude Desktop connects once · gains access to all tools</text>

  <!-- Current tools -->
  <rect x="50" y="322" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="120" y="337" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">save_application()</text>
  <text x="120" y="355" font-size="12" fill="#185FA5" text-anchor="middle">Agent 1 tool</text>

  <rect x="205" y="322" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="275" y="337" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">list_applications()</text>
  <text x="275" y="355" font-size="12" fill="#185FA5" text-anchor="middle">Agent 1 tool</text>

  <rect x="360" y="322" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="430" y="337" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">archive_app()</text>
  <text x="430" y="355" font-size="12" fill="#185FA5" text-anchor="middle">Agent 2 tool</text>

  <!-- Future tools -->
  <rect x="50" y="382" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="120" y="397" font-size="14" font-weight="500" fill="#444441" text-anchor="middle">draft_followup()</text>
  <text x="120" y="415" font-size="12" fill="#5F5E5A" text-anchor="middle">Agent 3 · future</text>

  <rect x="205" y="382" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="275" y="397" font-size="14" font-weight="500" fill="#444441" text-anchor="middle">prep_interview()</text>
  <text x="275" y="415" font-size="12" fill="#5F5E5A" text-anchor="middle">Agent 4 · future</text>

  <rect x="360" y="382" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="430" y="397" font-size="14" font-weight="500" fill="#444441" text-anchor="middle">track_status()</text>
  <text x="430" y="415" font-size="12" fill="#5F5E5A" text-anchor="middle">Agent 5 · future</text>

  <rect x="515" y="382" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="575" y="397" font-size="14" font-weight="500" fill="#444441" text-anchor="middle">more tools...</text>
  <text x="575" y="415" font-size="12" fill="#5F5E5A" text-anchor="middle">v3+ · extensible</text>

  <!-- Arrows agents to MCP server -->
  <line x1="105" y1="208" x2="105" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="255" y1="208" x2="255" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="208" x2="340" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="425" y1="208" x2="425" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="565" y1="208" x2="565" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
